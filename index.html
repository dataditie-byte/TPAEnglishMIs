<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>TKA English | Sanggar Mam Is</title>
<link rel="icon" href="assets/logo-mam-is.svg">
<style>
:root{--navy:#173b63;--blue:#2f80ed;--orange:#f59e0b;--red:#ef4444;--green:#16a34a;--bg:#f4f8fc;--ink:#172433;--muted:#64748b;--line:#dce5ef}
*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
button,select,input{font:inherit}.hidden{display:none!important}.wrap{width:min(1180px,calc(100% - 28px));margin:auto}
header{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;padding:18px 0 34px}
.brand{display:flex;align-items:center;gap:15px}.brand img{width:150px;background:#fff;border-radius:16px;padding:5px}
.brand h1{margin:0;font-size:clamp(24px,4vw,40px)}.brand p{margin:6px 0 0;color:#e5eef8}
.notice{margin-top:18px;background:rgba(255,255,255,.14);padding:12px 15px;border-radius:14px;font-size:14px}
main{padding:24px 0 50px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
select,.btn{border:0;border-radius:13px;padding:12px 15px;font-weight:700}.btn{cursor:pointer}.btn-primary{background:var(--navy);color:#fff}.btn-light{background:#fff;color:var(--navy);border:1px solid var(--line)}
.btn-green{background:var(--green);color:#fff}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.card{background:#fff;border:1px solid #e8eef5;border-radius:20px;padding:18px;box-shadow:0 9px 25px rgba(23,59,99,.09)}
.card h3{margin:0 0 9px;color:var(--navy)}.tag{display:inline-block;background:#edf6ff;color:var(--navy);border-radius:999px;padding:5px 9px;font-size:12px;font-weight:700;margin:2px}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:15px}.exam{display:grid;grid-template-columns:1fr 280px;gap:18px}
.topline{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.timer{font-weight:900;color:var(--red);font-size:20px}
.passage{background:#f8fbff;border-left:5px solid var(--blue);padding:16px;border-radius:12px;line-height:1.65;margin-bottom:15px}
.choice{display:block;border:1px solid var(--line);border-radius:13px;padding:12px;margin:9px 0;cursor:pointer}.choice:hover{border-color:var(--blue)}
.choice input{margin-right:9px}.numbers{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}.num{border:0;border-radius:10px;padding:9px;background:#e9eff5;cursor:pointer;font-weight:800}.num.answered{background:#d9f7e8;color:#087344}.num.current{outline:3px solid #f59e0b}
.result{text-align:center}.score{font-size:64px;font-weight:900;color:var(--navy)}.breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
.modal{position:fixed;inset:0;background:rgba(15,39,66,.62);display:none;align-items:center;justify-content:center;padding:18px;z-index:50}.modal.open{display:flex}.modal-card{width:min(720px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:22px;padding:22px}
.explain{border-bottom:1px solid var(--line);padding:12px 0}.small{font-size:13px;color:var(--muted)}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}.exam{grid-template-columns:1fr}.sidebar{order:-1}}@media(max-width:580px){.grid{grid-template-columns:1fr}.breakdown{grid-template-columns:1fr}.brand img{width:105px}.actions .btn{width:100%}}
@media print{header,.toolbar,.no-print{display:none!important}body{background:#fff}.card{box-shadow:none}}
</style>
</head>
<body>
<header><div class="wrap">
<div class="brand"><img src="assets/logo-mam-is.svg" alt="Logo"><div><h1>TKA English Practice</h1><p>Sanggar Mam Is Learning Hub</p></div></div>
<div class="notice"><b>Petunjuk:</b> Setiap soal mempunyai tepat DUA jawaban benar. Kelas 9 merupakan latihan Bahasa Inggris bergaya TKA; Bahasa Inggris bukan mata uji resmi TKA SMP 2026.</div>
</div></header>
<main class="wrap">
<section id="home">
<div class="toolbar"><select id="gradeFilter"><option value="all">Semua jenjang</option><option value="9">Kelas 9</option><option value="12">Kelas 12</option></select><button class="btn btn-light" onclick="renderPackages()">Tampilkan Paket</button></div>
<div id="packageGrid" class="grid"></div>
</section>
<section id="exam" class="hidden"></section>
<section id="result" class="hidden"></section>
</main>
<div id="modal" class="modal"><div class="modal-card"><div style="display:flex;justify-content:space-between;gap:10px"><h3>Pembahasan Terkunci</h3><button class="btn btn-light" onclick="closeModal()">Tutup</button></div><div id="modalBody"></div></div></div>
<script>
let packages=[],active=null,current=0,answers={},timer=null,remaining=0;
fetch('data/packages.json').then(r=>r.json()).then(d=>{packages=d;renderPackages()}).catch(()=>document.getElementById('packageGrid').innerHTML='<div class="card">Data paket gagal dimuat. Jalankan melalui GitHub Pages atau local server.</div>');
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function renderPackages(){let g=document.getElementById('gradeFilter').value;let rows=packages.filter(p=>g==='all'||String(p.grade)===g);document.getElementById('packageGrid').innerHTML=rows.map(p=>`<article class="card"><h3>${esc(p.title)}</h3><span class="tag">${p.question_count} soal</span><span class="tag">${p.duration} menit</span><span class="tag">MCMA</span><p class="small">${esc(p.description)}</p><div class="actions"><button class="btn btn-primary" onclick="startExam('${p.id}')">Mulai Simulasi</button><a class="btn btn-light" href="pdf/kelas-${p.grade}/${p.id}.pdf" download>Unduh PDF</a></div></article>`).join('')}
function startExam(id){active=packages.find(p=>p.id===id);current=0;answers={};remaining=active.duration*60;document.getElementById('home').classList.add('hidden');document.getElementById('result').classList.add('hidden');document.getElementById('exam').classList.remove('hidden');renderExam();clearInterval(timer);timer=setInterval(()=>{remaining--;document.getElementById('timer').textContent=formatTime(remaining);if(remaining<=0){clearInterval(timer);finishExam()}},1000)}
function formatTime(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function renderExam(){let q=active.questions[current];let chosen=answers[q.id]||[];document.getElementById('exam').innerHTML=`<div><div class="card"><div class="topline"><b>${esc(active.title)}</b><span id="timer" class="timer">${formatTime(remaining)}</span></div><div class="small">Soal ${current+1} dari ${active.questions.length} • ${esc(q.skill)} • Pilih tepat DUA jawaban</div><h3>${esc(q.passage_title)}</h3><div class="passage">${esc(q.passage)}</div><h3>${esc(q.question)}</h3>${q.choices.map((c,i)=>`<label class="choice"><input type="checkbox" ${chosen.includes(i)?'checked':''} onchange="toggleChoice(${q.id},${i},this.checked)"> ${String.fromCharCode(65+i)}. ${esc(c)}</label>`).join('')}<div class="actions"><button class="btn btn-light" onclick="prevQ()" ${current===0?'disabled':''}>Sebelumnya</button><button class="btn btn-primary" onclick="nextQ()">${current===active.questions.length-1?'Selesai':'Berikutnya'}</button></div></div></div><aside class="card sidebar"><h3>Navigasi Soal</h3><div class="numbers">${active.questions.map((x,i)=>`<button class="num ${(answers[x.id]||[]).length?'answered':''} ${i===current?'current':''}" onclick="goQ(${i})">${i+1}</button>`).join('')}</div><p class="small">Hijau: sudah dijawab.</p><button class="btn btn-green" style="width:100%" onclick="finishExam()">Akhiri Ujian</button></aside>`}
function toggleChoice(qid,i,on){let a=answers[qid]||[];if(on){if(a.length>=2){alert('Pilih tepat dua jawaban.');renderExam();return}a=[...a,i]}else a=a.filter(x=>x!==i);answers[qid]=a;renderExam()}
function prevQ(){if(current>0){current--;renderExam()}}function nextQ(){if(current<active.questions.length-1){current++;renderExam()}else finishExam()}function goQ(i){current=i;renderExam()}
function finishExam(){clearInterval(timer);let correct=0,by={};active.questions.forEach(q=>{let a=(answers[q.id]||[]).slice().sort().join(',');let c=q.correct.slice().sort().join(',');let ok=a===c;if(ok)correct++;by[q.skill]=by[q.skill]||[0,0];by[q.skill][1]++;if(ok)by[q.skill][0]++});let score=Math.round(correct/active.questions.length*100);document.getElementById('exam').classList.add('hidden');document.getElementById('result').classList.remove('hidden');document.getElementById('result').innerHTML=`<div class="card result"><h2>Hasil Simulasi</h2><div class="score">${score}</div><p>${correct} dari ${active.questions.length} soal benar</p><div class="breakdown">${Object.entries(by).map(([k,v])=>`<div class="card"><b>${esc(k)}</b><div style="font-size:27px;font-weight:900">${Math.round(v[0]/v[1]*100)}</div></div>`).join('')}</div><div class="actions" style="justify-content:center"><button class="btn btn-primary" onclick="backHome()">Kembali ke Paket</button><button class="btn btn-light" onclick="unlockDiscussion()">Pembahasan 🔒</button></div></div>`}
function unlockDiscussion(){let pin=prompt('Masukkan PIN pembahasan/admin:');if(pin!=='MAMIS2026'){alert('PIN tidak sesuai.');return}document.getElementById('modalBody').innerHTML=active.questions.map((q,i)=>`<div class="explain"><b>${i+1}. Jawaban: ${q.correct.map(x=>String.fromCharCode(65+x)).join(', ')}</b><p>${esc(q.explanation)}</p></div>`).join('');document.getElementById('modal').classList.add('open')}
function closeModal(){document.getElementById('modal').classList.remove('open')}function backHome(){document.getElementById('result').classList.add('hidden');document.getElementById('home').classList.remove('hidden');renderPackages()}
</script></body></html>
